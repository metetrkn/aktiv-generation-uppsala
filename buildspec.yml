version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - |
        # Install Poetry from local wheel
        pip install --no-index --find-links=./packages poetry-2.1.3-py3-none-any.whl
      - |
        # Force Poetry to use local wheels only
        export PIP_NO_INDEX=1
        export PIP_FIND_LINKS=./packages
      - |
        # Prevent virtualenvs (install to system env)
        poetry config virtualenvs.create false
      - |
        # Install exact dependencies from poetry.lock using local wheels
        poetry install --no-dev --no-interaction --no-ansi

  pre_build:
    commands:
      - |
        # Run Django migrations and collect static files
        poetry run python manage.py migrate --noinput
        poetry run python manage.py collectstatic --noinput

  build:
    commands:
      - |
        # Zip project excluding unnecessary files
        zip -r app.zip . -x "*.git*" "media/*" "media-/*" "*.pyc" "*__pycache__*" "packages/*"

  post_build:
    commands:
      - echo "Offline build and packaging complete."

artifacts:
  files:
    - app.zip
